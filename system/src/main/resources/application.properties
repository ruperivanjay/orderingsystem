# 1. Database Connection - Matches your Raw Editor exactly
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate Settings - Using 'create' to fix the migration crash in image_11717d.png
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Railway Environment - Crucial for the app to be "Active"
server.port=${PORT:8080}

# 4. Connection Pool Optimization (Prevents "undefined" timeouts)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5