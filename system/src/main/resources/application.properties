# Server Port
# Railway automatically assigns a port, but setting this tells Spring Boot to look for it.
server.port=${PORT:8080}

# Database Configuration
# These variables come directly from your MySQL service on Railway.
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
# 'update' will automatically create your tables (users, items, etc.) if they don't exist.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pooling
# Hikari is the default; this helps prevent the connection crashes seen in your logs.
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
