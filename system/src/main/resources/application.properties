# Server Configuration
# Railway assigns a dynamic port; this tells Spring to listen to it
server.port=${PORT:8080}

# Database Connection
# Uses the variables we linked from your MySQL service
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate & JPA Settings
# 'update' automatically creates your users and items tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security & JWT
# This resolves the 'jwt.secret' placeholder error from your logs
jwt.secret=${JWT_SECRET}

# Connection Pooling
# Helps manage database traffic to prevent startup timeouts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
