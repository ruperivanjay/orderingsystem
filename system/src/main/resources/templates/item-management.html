<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Item Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f4f4; min-height: 100vh; }

        .navbar {
            background: #4f46e5; color: white;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 18px; font-weight: 500; }
        .back-btn {
            background: rgba(255,255,255,0.2); border: none;
            color: white; padding: 0.4rem 1rem;
            border-radius: 6px; cursor: pointer; font-size: 13px;
            text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        .top-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.2rem; gap: 1rem;
        }
        .search-input {
            padding: 0.6rem 1rem; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px; width: 260px;
        }
        .add-btn {
            background: #4f46e5; color: white; border: none;
            padding: 0.6rem 1.2rem; border-radius: 6px;
            cursor: pointer; font-size: 14px;
        }
        .add-btn:hover { background: #4338ca; }

        /* Table */
        table {
            width: 100%; background: white;
            border-radius: 10px; border-collapse: collapse;
            overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        th {
            background: #f9fafb; padding: 0.8rem 1rem;
            text-align: left; font-size: 13px;
            color: #6b7280; font-weight: 500;
            border-bottom: 1px solid #e5e7eb;
        }
        td {
            padding: 0.85rem 1rem; font-size: 14px;
            border-bottom: 1px solid #f3f4f6; color: #111827;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .badge {
            padding: 0.2rem 0.6rem; border-radius: 20px;
            font-size: 12px; font-weight: 500;
        }
        .badge-food { background: #dcfce7; color: #166534; }
        .badge-drink { background: #dbeafe; color: #1e40af; }
        .badge-other { background: #f3f4f6; color: #374151; }

        .edit-btn {
            background: #f0fdf4; color: #16a34a;
            border: 1px solid #bbf7d0; padding: 0.3rem 0.7rem;
            border-radius: 5px; cursor: pointer; font-size: 12px;
            margin-right: 4px;
        }
        .del-btn {
            background: #fff1f2; color: #dc2626;
            border: 1px solid #fecdd3; padding: 0.3rem 0.7rem;
            border-radius: 5px; cursor: pointer; font-size: 12px;
        }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: 12px;
            padding: 2rem; width: 420px; max-width: 95%;
        }
        .modal h3 { font-size: 16px; margin-bottom: 1.2rem; color: #111827; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block; font-size: 13px;
            color: #374151; margin-bottom: 0.3rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%; padding: 0.6rem 0.8rem;
            border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 14px; font-family: sans-serif;
        }
        .form-group textarea { height: 70px; resize: vertical; }
        .modal-actions {
            display: flex; justify-content: flex-end;
            gap: 0.6rem; margin-top: 1.2rem;
        }
        .cancel-btn {
            padding: 0.55rem 1rem; border: 1px solid #d1d5db;
            border-radius: 6px; background: white;
            cursor: pointer; font-size: 14px;
        }
        .save-btn {
            padding: 0.55rem 1.2rem; background: #4f46e5;
            color: white; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px;
        }
        .save-btn:hover { background: #4338ca; }

        #message {
            padding: 0.7rem 1rem; border-radius: 6px;
            margin-bottom: 1rem; font-size: 13px; display: none;
        }
        .msg-success { background: #dcfce7; color: #166534; display: block !important; }
        .msg-error   { background: #fff1f2; color: #dc2626; display: block !important; }

        .empty-state {
            text-align: center; padding: 3rem;
            color: #9ca3af; font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h1>Item Management</h1>
    <!-- Grouped User Info and Back Button -->
    <div style="display:flex;align-items:center;gap:1rem;">
        <span id="nav-user" style="font-size:13px;opacity:0.85"></span>
        <a href="/dashboard" class="back-btn">← Back to Menu</a>
    </div>
</div>

<div class="container">

    <div id="message"></div>

    <!-- Top bar -->
    <div class="top-bar">
        <input class="search-input" type="text" id="searchInput"
               placeholder="Search item name..." oninput="searchItems()"/>
        <button class="add-btn" onclick="openAddModal()">+ Add Item</button>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="itemTableBody">
            <tr><td colspan="7" class="empty-state">Loading items...</td></tr>
        </tbody>
    </table>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Add Item</h3>
        <input type="hidden" id="itemId"/>

        <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g. Burger"/>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="itemCategory">
                <option value="Food">Food</option>
                <option value="Drink">Drink</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Price</label>
            <input type="number" id="itemPrice" placeholder="0.00" step="0.01"/>
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="itemQuantity" placeholder="0"/>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="itemDescription" placeholder="Optional description..."></textarea>
        </div>

        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            <button class="save-btn" onclick="saveItem()">Save Item</button>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
<script>
    // Only ADMIN and CASHIER can access
    if (typeof requireRole === 'function') {
        requireRole(['ADMIN', 'CASHIER']);
    }

    // Show current user in navbar
    if (typeof getCurrentUser === 'function') {
        const user = getCurrentUser();
        if (user) {
            document.getElementById('nav-user').textContent = 
                user.sub + ' (' + getUserRole() + ')';
        }
    }
</script>

<script>
    // Check token
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    // Load all items on page load
    window.onload = () => loadItems();

    async function loadItems() {
        try {
            const res = await fetch('/api/items');
            const items = await res.json();
            renderTable(items);
        } catch (err) {
            console.error("Error loading items:", err);
        }
    }

    async function searchItems() {
        const q = document.getElementById('searchInput').value.trim();
        if (q === '') { loadItems(); return; }
        const res = await fetch('/api/items/search?name=' + encodeURIComponent(q));
        const items = await res.json();
        renderTable(items);
    }

    function renderTable(items) {
        const tbody = document.getElementById('itemTableBody');
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No items found.</td></tr>';
            return;
        }
        tbody.innerHTML = items.map((item, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${item.name}</td>
                <td><span class="badge badge-${item.category.toLowerCase()}">${item.category}</span></td>
                <td>₱${item.price.toFixed(2)}</td>
                <td>${item.quantity}</td>
                <td>${item.description || '—'}</td>
                <td>
                    <button class="edit-btn" onclick="openEditModal(${item.id})">Edit</button>
                    <button class="del-btn" onclick="deleteItem(${item.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    // Open Add Modal
    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Add Item';
        document.getElementById('itemId').value = '';
        document.getElementById('itemName').value = '';
        document.getElementById('itemCategory').value = 'Food';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemQuantity').value = '';
        document.getElementById('itemDescription').value = '';
        document.getElementById('modalOverlay').classList.add('active');
    }

    // Open Edit Modal
    async function openEditModal(id) {
        const res = await fetch('/api/items/' + id);
        const item = await res.json();
        document.getElementById('modalTitle').textContent = 'Edit Item';
        document.getElementById('itemId').value = item.id;
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemCategory').value = item.category;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemQuantity').value = item.quantity;
        document.getElementById('itemDescription').value = item.description || '';
        document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    // Save (Add or Update)
    async function saveItem() {
        const id = document.getElementById('itemId').value;
        const body = {
            name: document.getElementById('itemName').value,
            category: document.getElementById('itemCategory').value,
            price: parseFloat(document.getElementById('itemPrice').value),
            quantity: parseInt(document.getElementById('itemQuantity').value),
            description: document.getElementById('itemDescription').value
        };

        const isEdit = id !== '';
        const url = isEdit ? '/api/items/' + id : '/api/items';
        const method = isEdit ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            closeModal();
            loadItems();
            showMessage(isEdit ? 'Item updated successfully!' : 'Item added successfully!', 'success');
        } else {
            showMessage('Something went wrong. Please try again.', 'error');
        }
    }

    // Delete
    async function deleteItem(id) {
        if (!confirm('Are you sure you want to delete this item?')) return;
        const res = await fetch('/api/items/' + id, { method: 'DELETE' });
        if (res.ok) {
            loadItems();
            showMessage('Item deleted successfully!', 'success');
        } else {
            showMessage('Failed to delete item.', 'error');
        }
    }

    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = type === 'success' ? 'msg-success' : 'msg-error';
        setTimeout(() => { msg.className = ''; msg.textContent = ''; }, 3000);
    }
</script>

</body>
</html>
