<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ordering System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <h1>Ordering System</h1>
        <span id="userDisplay">jay</span>
    </nav>

    <div class="container">
        <div class="panel">
            <h3>Select Items</h3>
            <div id="productGrid" class="item-grid">
                <!-- Data from /api/products loads here -->
            </div>
        </div>

        <div class="panel">
            <h3>Recent Orders</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <!-- Data from /api/orders loads here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Script at bottom ensures DOM is ready -->
    <script th:src="@{/js/order-logic.js}"></script>
</body>
</html>
