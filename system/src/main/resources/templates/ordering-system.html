<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ordering System</title>
    <!-- Updated path to match your current GitHub folder (static/js/style.css) -->
    <link rel="stylesheet" th:href="@{/js/style.css}">
</head>
<body>

<div id="message"></div>

<div class="navbar">
    <h1>Ordering System</h1>
    <div style="display:flex;align-items:center;gap:1.5rem;">
        <span id="nav-user" style="font-size:13px; opacity:0.9; font-weight: 500;"></span>
        <a th:href="@{/dashboard}" class="back-btn">← Back to Menu</a>
    </div>
</div>

<div class="container">
    <!-- Summary Cards -->
    <div class="summary-cards">
        <div class="card">
            <div class="card-label">Total Orders</div>
            <div class="card-value blue" id="totalOrders">0</div>
        </div>
        <div class="card">
            <div class="card-label">Completed</div>
            <div class="card-value green" id="completedOrders">0</div>
        </div>
        <div class="card">
            <div class="card-label">Pending</div>
            <div class="card-value amber" id="pendingOrders">0</div>
        </div>
        <div class="card">
            <div class="card-label">Total Sales</div>
            <div class="card-value" id="totalSales">₱0.00</div>
        </div>
    </div>

    <div class="order-layout">
        <!-- Item Selection -->
        <div class="panel">
            <h3>Select Items</h3>
            <div class="form-group">
                <input type="text" placeholder="Search products..." oninput="filterItems(this.value)" />
            </div>
            <div class="item-grid" id="itemGrid"></div>
        </div>

        <!-- Checkout Panel -->
        <div class="panel">
            <h3>Current Cart</h3>
            <div id="cartItems">
                <div style="text-align:center; padding:2rem; color:#9ca3af; font-size:14px;">Your cart is empty</div>
            </div>

            <div class="cart-summary">
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="subtotalDisplay">₱0.00</span>
                </div>
                <div class="summary-line">
                    <span>Discount (₱)</span>
                    <input type="number" id="discountInput" value="0" min="0" oninput="updateSummary()"/>
                </div>
                <div class="total-line">
                    <span>Total</span>
                    <span id="totalDisplay">₱0.00</span>
                </div>
            </div>

            <div class="checkout-form">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customerName" placeholder="Enter name..." />
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="paymentMethod">
                        <option value="Cash">Cash</option>
                        <option value="GCash">GCash</option>
                        <option value="Card">Credit/Debit Card</option>
                    </select>
                </div>
            </div>
            <button class="place-order-btn" onclick="placeOrder()">Process Checkout</button>
        </div>
    </div>

    <h3 style="margin-bottom:1rem; font-size:18px;">Recent Orders</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orderTableBody"></tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/order-logic.js}"></script>
</body>
</html>
