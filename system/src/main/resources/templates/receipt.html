<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Receipt</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', monospace;
            background: #f4f4f4;
            display: flex; justify-content: center;
            padding: 2rem 1rem;
        }

        .receipt {
            background: white;
            width: 380px;
            padding: 2rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        /* Header */
        .receipt-header {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 2px dashed #e5e7eb;
            margin-bottom: 1rem;
        }
        .receipt-header h2 {
            font-size: 20px; font-weight: 700;
            letter-spacing: 1px; color: #111827;
        }
        .receipt-header p {
            font-size: 12px; color: #6b7280; margin-top: 4px;
        }

        /* Order info */
        .info-row {
            display: flex; justify-content: space-between;
            font-size: 12px; padding: 0.2rem 0; color: #374151;
        }
        .info-row span:last-child { text-align: right; }

        .divider {
            border: none; border-top: 1px dashed #e5e7eb;
            margin: 0.8rem 0;
        }

        /* Items */
        .item-header {
            display: flex; justify-content: space-between;
            font-size: 11px; font-weight: 700;
            color: #6b7280; padding-bottom: 0.4rem;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 0.4rem;
        }
        .item-row {
            display: flex; justify-content: space-between;
            font-size: 12px; padding: 0.25rem 0; color: #111827;
        }
        .item-row .item-name { flex: 1; }
        .item-row .item-qty  {
            min-width: 40px; text-align: center; color: #6b7280;
        }
        .item-row .item-total {
            min-width: 70px; text-align: right;
        }

        /* Totals */
        .totals { margin-top: 0.8rem; }
        .total-row {
            display: flex; justify-content: space-between;
            font-size: 13px; padding: 0.25rem 0; color: #374151;
        }
        .total-row.grand {
            font-size: 16px; font-weight: 700;
            color: #111827; border-top: 2px dashed #e5e7eb;
            padding-top: 0.6rem; margin-top: 0.4rem;
        }

        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem; border-radius: 10px;
            font-size: 11px; font-weight: 700;
        }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-pending   { background: #fef9c3; color: #854d0e; }
        .status-cancelled { background: #fff1f2; color: #dc2626; }
        .status-paid      { background: #dcfce7; color: #166534; }
        .status-unpaid    { background: #fff1f2; color: #dc2626; }

        /* Footer */
        .receipt-footer {
            text-align: center; margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px dashed #e5e7eb;
            font-size: 12px; color: #6b7280;
        }
        .receipt-footer p { margin-top: 4px; }

        /* Print button */
        .print-area {
            display: flex; gap: 0.6rem;
            justify-content: center; margin-top: 1.5rem;
        }
        .print-btn {
            padding: 0.6rem 1.5rem; background: #4f46e5;
            color: white; border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px; font-family: sans-serif;
        }
        .print-btn:hover { background: #4338ca; }
        .back-btn {
            padding: 0.6rem 1.5rem; background: white;
            color: #374151; border: 1px solid #d1d5db;
            border-radius: 6px; cursor: pointer;
            font-size: 14px; font-family: sans-serif;
            text-decoration: none; display: inline-block;
        }

        @media print {
            body { background: white; padding: 0; }
            .receipt {
                box-shadow: none; border-radius: 0;
                width: 100%;
            }
            .print-area { display: none; }
        }
    </style>
</head>
<body>

<div>
    <div class="receipt">

        <!-- Header -->
        <div class="receipt-header">
            <h2>ORDERING SYSTEM</h2>
            <p>Official Receipt</p>
            <p th:text="${order.orderNumber}"
               style="font-weight:700;margin-top:4px;color:#4f46e5">
            </p>
        </div>

        <!-- Order Info -->
        <div class="info-row">
            <span>Customer</span>
            <span th:text="${order.customerName}"></span>
        </div>
        <div class="info-row">
            <span>Date</span>
            <span th:text="${#temporals.format(order.orderDate,
                           'MMM dd, yyyy hh:mm a')}"></span>
        </div>
        <div class="info-row">
            <span>Payment Method</span>
            <span th:text="${order.paymentMethod}"></span>
        </div>
        <div class="info-row">
            <span>Payment Status</span>
            <span>
                <span th:text="${order.paymentStatus}"
                      th:class="${'status-badge status-' +
                      order.paymentStatus.toLowerCase()}"></span>
            </span>
        </div>
        <div class="info-row">
            <span>Order Status</span>
            <span>
                <span th:text="${order.status}"
                      th:class="${'status-badge status-' +
                      order.status.toLowerCase()}"></span>
            </span>
        </div>

        <hr class="divider"/>

        <!-- Items -->
        <div class="item-header">
            <span>Item</span>
            <span>Qty</span>
            <span>Amount</span>
        </div>

        <div th:each="item : ${order.orderItems}">
            <div class="item-row">
                <span class="item-name" th:text="${item.itemName}"></span>
                <span class="item-qty" th:text="${item.quantity}"></span>
                <span class="item-total"
                      th:text="'₱' + ${#numbers.formatDecimal(
                      item.subtotal, 1, 2)}"></span>
            </div>
            <div style="font-size:11px;color:#9ca3af;padding-left:4px;
                        padding-bottom:2px">
                @ ₱<span th:text="${#numbers.formatDecimal(
                          item.itemPrice, 1, 2)}"></span> each
            </div>
        </div>

        <hr class="divider"/>

        <!-- Totals -->
        <div class="totals">
            <div class="total-row">
                <span>Subtotal</span>
                <span th:text="'₱' + ${#numbers.formatDecimal(
                      order.totalAmount, 1, 2)}"></span>
            </div>
            <div class="total-row">
                <span>Discount</span>
                <span th:text="'- ₱' + ${#numbers.formatDecimal(
                      order.discount, 1, 2)}"></span>
            </div>
            <div class="total-row grand">
                <span>TOTAL</span>
                <span th:text="'₱' + ${#numbers.formatDecimal(
                      order.finalAmount, 1, 2)}"></span>
            </div>
        </div>

        <!-- Footer -->
        <div class="receipt-footer">
            <p>Thank you for your order!</p>
            <p>Please come again.</p>
            <p style="margin-top:0.8rem;font-size:11px">
                Generated by Ordering System &copy; 2025
            </p>
        </div>

    </div>

    <!-- Buttons (hidden on print) -->
    <div class="print-area">
        <a class="back-btn" href="/reports">← Back</a>
        <button class="print-btn" onclick="window.print()">
            Print Receipt
        </button>
    </div>
</div>

</body>
</html>
